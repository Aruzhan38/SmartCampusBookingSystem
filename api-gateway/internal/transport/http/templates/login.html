<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Smart Campus Booking</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --ink: #102033;
            --muted: #667085;
            --line: #dbe3ef;
            --brand: #2563eb;
            --indigo: #4f46e5;
            --danger: #b42318;
            --success: #087443;
            --shadow: 0 18px 45px rgba(31, 41, 55, 0.12);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #dbeafe 0, transparent 34%), var(--bg);
            color: var(--ink);
        }
        .nav {
            min-height: 72px;
            padding: 0 7vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(219, 227, 239, 0.8);
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(14px);
        }
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; }
        .brand-mark {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: white;
            background: linear-gradient(135deg, var(--brand), var(--indigo));
        }
        .nav a { color: var(--brand); font-weight: 800; text-decoration: none; }
        .shell {
            min-height: calc(100vh - 72px);
            padding: 54px 7vw;
            display: grid;
            grid-template-columns: minmax(280px, 0.82fr) minmax(320px, 420px);
            gap: 42px;
            align-items: center;
        }
        .copy h1 { margin: 0; font-size: clamp(2.1rem, 5vw, 4rem); line-height: 1; }
        .copy p { color: var(--muted); font-size: 1.08rem; line-height: 1.7; max-width: 620px; }
        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 28px;
        }
        .card h2 { margin: 0 0 8px; font-size: 1.5rem; }
        .hint { margin: 0 0 24px; color: var(--muted); line-height: 1.5; }
        label { display: block; margin: 16px 0 8px; font-weight: 800; color: #344054; }
        input {
            width: 100%;
            min-height: 46px;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 0 14px;
            font: inherit;
            background: #fbfdff;
            color: var(--ink);
        }
        input:focus {
            outline: 3px solid rgba(37, 99, 235, 0.14);
            border-color: var(--brand);
        }
        .btn {
            width: 100%;
            min-height: 46px;
            margin-top: 20px;
            border: 0;
            border-radius: 12px;
            color: white;
            background: linear-gradient(135deg, var(--brand), var(--indigo));
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 12px 26px rgba(37, 99, 235, 0.26);
        }
        .btn:disabled { opacity: 0.65; cursor: wait; }
        .message {
            display: none;
            margin: 0 0 16px;
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 700;
            line-height: 1.45;
        }
        .message.error { display: block; color: var(--danger); background: #fef3f2; border: 1px solid #fecdca; }
        .message.success { display: block; color: var(--success); background: #ecfdf3; border: 1px solid #abefc6; }
        .links { margin-top: 18px; color: var(--muted); text-align: center; }
        .links a { color: var(--brand); font-weight: 800; text-decoration: none; }
        @media (max-width: 820px) {
            .shell { grid-template-columns: 1fr; padding-top: 34px; }
            .copy { display: none; }
        }
    </style>
</head>
<body>
    <header class="nav">
        <div class="brand"><div class="brand-mark">SC</div><span>Smart Campus</span></div>
        <a href="/">Home</a>
    </header>

    <main class="shell">
        <section class="copy">
            <h1>Welcome back.</h1>
            <p>Sign in to manage rooms, bookings, and campus schedules from the API Gateway dashboard.</p>
        </section>
        <section class="card">
            <h2>Login</h2>
            <p class="hint">Use your campus account to continue.</p>
            <div id="message" class="message"></div>
            <form id="loginForm">
                <label for="email">Email</label>
                <input id="email" type="email" autocomplete="email" required />

                <label for="password">Password</label>
                <input id="password" type="password" autocomplete="current-password" required />

                <button id="loginBtn" class="btn" type="submit">Login</button>
            </form>
            <p class="links">No account yet? <a href="/register">Create one</a></p>
        </section>
    </main>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const message = document.getElementById('message');

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
        }

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            loginBtn.disabled = true;
            message.className = 'message';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    showMessage(data.error || data.message || 'Login failed', 'error');
                    return;
                }
                localStorage.setItem('sc_token', data.token);
                showMessage('Login successful. Opening rooms...', 'success');
                window.location.href = '/rooms-ui';
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
