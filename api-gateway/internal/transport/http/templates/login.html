<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Smart Campus</title>
    <style>
        :root { --bg:#eef5ff; --sidebar:#fbfdff; --card:#fbfcff; --text:#2d3748; --muted:#8da0bd; --line:#dde8f6; --blue:#5b9dec; --teal:#65c8a7; --danger:#ef4444; --success:#15803d; --shadow:0 16px 40px rgba(61,83,120,.08); --radius:22px; }
        *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
        .app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;padding:28px 20px;background:var(--sidebar);border-right:1px solid var(--line);display:flex;flex-direction:column;gap:34px}
        .brand{display:flex;align-items:center;gap:14px;font-size:1.25rem;font-weight:900;text-decoration:none;color:var(--text)}.brand-icon{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;color:white;background:linear-gradient(135deg,var(--blue),var(--teal));font-weight:900}
        .nav{display:grid;gap:10px}.nav a{min-height:52px;padding:0 16px;border-radius:16px;display:flex;align-items:center;gap:14px;color:#617492;font-weight:800;text-decoration:none}.nav a:hover{background:#edf5ff;color:var(--text)}
        .main{min-width:0}.topbar{height:72px;border-bottom:1px solid var(--line);background:rgba(251,253,255,.84);display:flex;justify-content:flex-end;align-items:center;padding:0 28px}.content{width:min(980px,calc(100% - 64px));margin:0 auto;padding:72px 0}
        .auth-layout{display:grid;grid-template-columns:1fr 420px;gap:32px;align-items:center}.hero h1{margin:0;font-size:clamp(2.2rem,4vw,3.4rem);line-height:1}.hero p{color:var(--muted);font-size:1.08rem;font-weight:650;line-height:1.65}
        .card{background:var(--card);border:1px solid #edf3fb;border-radius:var(--radius);box-shadow:var(--shadow);padding:28px}.card h2{margin:0 0 8px}.hint{margin:0 0 22px;color:var(--muted);font-weight:650}.alert{display:none;margin:0 0 16px;padding:14px 16px;border-radius:16px;font-weight:800}.alert.error{display:block;color:#b42318;background:#fef3f2;border:1px solid #fecdca}.alert.success{display:block;color:var(--success);background:#ecfdf3;border:1px solid #abefc6}
        label{display:block;color:#617492;font-weight:850;margin:14px 0 8px}input{width:100%;min-height:50px;border:1px solid #d8e5f5;border-radius:16px;padding:0 16px;background:white;color:var(--text);font:inherit}input:focus{outline:0;border-color:#8bc1ff;box-shadow:0 0 0 4px rgba(91,157,236,.16)}
        .btn{width:100%;min-height:50px;border:0;border-radius:16px;margin-top:18px;color:white;background:linear-gradient(135deg,var(--blue),var(--teal));font:inherit;font-weight:900;cursor:pointer}.btn:disabled{opacity:.65;cursor:wait}.links{text-align:center;color:var(--muted);font-weight:700}.links a{color:#2563eb;font-weight:900;text-decoration:none}
        @media(max-width:860px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.content{width:min(100% - 28px,980px);padding:36px 0}.auth-layout{grid-template-columns:1fr}.hero{display:none}}
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <a class="brand" href="/"><span class="brand-icon">SC</span><span>Smart Campus</span></a>
            <nav class="nav">
                <a href="/">▦ Dashboard</a>
                <a href="/rooms-ui">▥ Rooms</a>
            </nav>
        </aside>
        <main class="main">
            <div class="topbar">♢</div>
            <section class="content auth-layout">
                <div class="hero"><h1>Welcome back.</h1><p>Sign in to reserve rooms and manage your campus bookings.</p></div>
                <section class="card">
                    <h2>Login</h2><p class="hint">Use your campus account credentials.</p>
                    <div id="message" class="alert"></div>
                    <form id="loginForm">
                        <label for="email">Email</label><input id="email" type="email" autocomplete="email" required />
                        <label for="password">Password</label><input id="password" type="password" autocomplete="current-password" required />
                        <button id="loginBtn" class="btn" type="submit">Login</button>
                    </form>
                    <p class="links">No account yet? <a href="/register">Create one</a></p>
                </section>
            </section>
        </main>
    </div>
    <script>
        const loginForm=document.getElementById('loginForm');const loginBtn=document.getElementById('loginBtn');const message=document.getElementById('message');
        function showMessage(text,type){message.textContent=text;message.className='alert '+type}
        function decodeToken(token){try{const base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');return JSON.parse(decodeURIComponent(escape(atob(base64))))}catch(e){return null}}
        loginForm.addEventListener('submit',async(event)=>{event.preventDefault();loginBtn.disabled=true;loginBtn.textContent='Signing in...';message.className='alert';const email=document.getElementById('email').value.trim();const password=document.getElementById('password').value;try{const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});const data=await res.json().catch(()=>({}));if(!res.ok){showMessage(data.error||data.message||'Login failed','error');return}localStorage.setItem('sc_token',data.token);const user=decodeToken(data.token);if(user)localStorage.setItem('sc_user',JSON.stringify(user));showMessage('Login successful. Opening rooms...','success');window.location.href='/rooms-ui'}catch(error){showMessage('Network error. Please try again.','error')}finally{loginBtn.disabled=false;loginBtn.textContent='Login'}});
    </script>
</body>
</html>
