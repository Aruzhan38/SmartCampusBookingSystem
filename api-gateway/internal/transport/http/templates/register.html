<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Smart Campus Booking</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --ink: #102033;
            --muted: #667085;
            --line: #dbe3ef;
            --brand: #2563eb;
            --indigo: #4f46e5;
            --teal: #0f766e;
            --danger: #b42318;
            --success: #087443;
            --shadow: 0 18px 45px rgba(31, 41, 55, 0.12);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top right, #ccfbf1 0, transparent 32%), var(--bg);
            color: var(--ink);
        }
        .nav {
            min-height: 72px;
            padding: 0 7vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(219, 227, 239, 0.8);
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(14px);
        }
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; }
        .brand-mark {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: white;
            background: linear-gradient(135deg, var(--brand), var(--indigo));
        }
        .nav a { color: var(--brand); font-weight: 800; text-decoration: none; }
        .nav-links { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .btn {
            min-height: 42px;
            padding: 11px 18px;
            border: 0;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn.btn-primary {
            background: linear-gradient(135deg, var(--brand), var(--indigo));
            color: white;
            box-shadow: 0 12px 26px rgba(37, 99, 235, 0.28);
        }
        .btn.btn-soft {
            color: var(--brand-dark);
            background: #eaf1ff;
        }
        .shell {
            min-height: calc(100vh - 72px);
            padding: 46px 7vw;
            display: grid;
            grid-template-columns: minmax(320px, 450px) minmax(280px, 1fr);
            gap: 44px;
            align-items: center;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 28px;
        }
        .card h1 { margin: 0 0 8px; font-size: 1.7rem; }
        .hint { margin: 0 0 22px; color: var(--muted); line-height: 1.5; }
        label { display: block; margin: 15px 0 8px; font-weight: 800; color: #344054; }
        input, select {
            width: 100%;
            min-height: 46px;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 0 14px;
            font: inherit;
            background: #fbfdff;
            color: var(--ink);
        }
        input:focus, select:focus {
            outline: 3px solid rgba(37, 99, 235, 0.14);
            border-color: var(--brand);
        }
        .btn-submit {
            width: 100%;
            min-height: 46px;
            margin-top: 20px;
            border: 0;
            border-radius: 12px;
            color: white;
            background: linear-gradient(135deg, var(--teal), var(--brand));
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 12px 26px rgba(15, 118, 110, 0.22);
        }
        .btn-submit:disabled { opacity: 0.65; cursor: wait; }
        .copy h2 { margin: 0; font-size: clamp(2rem, 4vw, 3.7rem); line-height: 1; }
        .copy p { color: var(--muted); font-size: 1.08rem; line-height: 1.7; max-width: 640px; }
        .pill-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 22px; }
        .pill {
            padding: 9px 12px;
            border-radius: 999px;
            background: white;
            border: 1px solid var(--line);
            color: var(--muted);
            font-weight: 800;
        }
        .message {
            display: none;
            margin: 0 0 16px;
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 700;
            line-height: 1.45;
        }
        .message.error { display: block; color: var(--danger); background: #fef3f2; border: 1px solid #fecdca; }
        .message.success { display: block; color: var(--success); background: #ecfdf3; border: 1px solid #abefc6; }
        .links { margin-top: 18px; color: var(--muted); text-align: center; }
        .links a { color: var(--brand); font-weight: 800; text-decoration: none; }
        @media (max-width: 860px) {
            .shell { grid-template-columns: 1fr; padding-top: 32px; }
            .copy { order: -1; }
            .nav { align-items: flex-start; padding-top: 16px; padding-bottom: 16px; flex-direction: column; gap: 14px; }
            .nav-links { width: 100%; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <header class="nav">
        <div class="brand"><div class="brand-mark">SC</div><span>Smart Campus</span></div>
        <nav class="nav-links" id="navbarLinks"></nav>
    </header>

    <main class="shell">
        <section class="card">
            <h1>Create account</h1>
            <p class="hint">Register a campus user for the booking demo.</p>
            <div id="message" class="message"></div>
            <form id="registerForm">
                <label for="full_name">Full name</label>
                <input id="full_name" type="text" autocomplete="name" required />

                <label for="email">Email</label>
                <input id="email" type="email" autocomplete="email" required />

                <label for="password">Password</label>
                <input id="password" type="password" autocomplete="new-password" minlength="6" required />

                <label for="role">Role</label>
                <select id="role" required>
                    <option value="Student">Student</option>
                    <option value="Professor">Professor</option>
                    <option value="Admin">Admin</option>
                </select>

                <button id="registerBtn" class="btn-submit" type="submit">Register</button>
            </form>
            <p class="links">Already registered? <a href="/login">Login</a></p>
        </section>

        <section class="copy">
            <h2>Book smarter across campus.</h2>
            <p>Use secure login, room discovery, and booking conflict checks to keep shared spaces organized.</p>
            <div class="pill-row">
                <span class="pill">Room Search</span>
                <span class="pill">JWT Protected</span>
                <span class="pill">Conflict Checks</span>
            </div>
        </section>
    </main>

    <script>
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const message = document.getElementById('message');
        const navbarLinks = document.getElementById('navbarLinks');
        const isAuthenticated = !!localStorage.getItem('sc_token');

        function logout() {
            localStorage.removeItem('sc_token');
            window.location.href = '/login';
        }

        function renderNavbar() {
            if (isAuthenticated) {
                navbarLinks.innerHTML = `
                    <a class="btn btn-soft" href="/">Home</a>
                    <a class="btn btn-soft" href="/rooms-ui">Rooms</a>
                    <a class="btn btn-soft" href="/bookings-ui">My Bookings</a>
                    <a class="btn btn-soft" href="/profile">Profile</a>
                    <button class="btn btn-primary" type="button" id="logoutBtn">Logout</button>
                `;
                document.getElementById('logoutBtn').addEventListener('click', logout);
            } else {
                navbarLinks.innerHTML = `
                    <a class="btn btn-soft" href="/">Home</a>
                    <a class="btn btn-primary" href="/login">Login</a>
                `;
            }
        }

        renderNavbar();

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
        }

        registerForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            registerBtn.disabled = true;
            message.className = 'message';

            const full_name = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name, email, password, role })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    showMessage(data.error || data.message || 'Registration failed', 'error');
                    return;
                }
                showMessage('Registration successful. Opening login...', 'success');
                window.location.href = '/login';
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                registerBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
