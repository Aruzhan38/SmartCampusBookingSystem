<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rooms - Smart Campus Booking</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --ink: #102033;
            --muted: #667085;
            --line: #dbe3ef;
            --brand: #2563eb;
            --brand-dark: #1e40af;
            --indigo: #4f46e5;
            --teal: #0f766e;
            --amber: #b45309;
            --danger: #b42318;
            --success: #087443;
            --shadow: 0 14px 34px rgba(31, 41, 55, 0.1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--ink);
        }
        .nav {
            min-height: 72px;
            padding: 0 5vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(219, 227, 239, 0.86);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 900; }
        .brand-mark {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: white;
            background: linear-gradient(135deg, var(--brand), var(--indigo));
        }
        .nav-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            min-height: 40px;
            padding: 10px 14px;
            border: 0;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 850;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--ink);
            background: #eef2ff;
        }
        .btn-primary { background: linear-gradient(135deg, var(--brand), var(--indigo)); color: white; }
        .btn-teal { background: #ccfbf1; color: #115e59; }
        .btn-danger { background: #fee4e2; color: var(--danger); }
        .btn:disabled { opacity: 0.65; cursor: wait; }
        .page {
            padding: 34px 5vw 56px;
        }
        .page-head {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: flex-end;
            margin-bottom: 24px;
        }
        h1 { margin: 0; font-size: clamp(2rem, 4vw, 3.2rem); line-height: 1; }
        .subtle { color: var(--muted); line-height: 1.55; margin: 10px 0 0; }
        .message {
            display: none;
            margin: 0 0 18px;
            padding: 13px 15px;
            border-radius: 12px;
            font-weight: 800;
            line-height: 1.45;
        }
        .message.error { display: block; color: var(--danger); background: #fef3f2; border: 1px solid #fecdca; }
        .message.success { display: block; color: var(--success); background: #ecfdf3; border: 1px solid #abefc6; }
        .message.info { display: block; color: var(--brand-dark); background: #eff6ff; border: 1px solid #bfdbfe; }
        .grid {
            display: grid;
            grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
            gap: 22px;
            align-items: start;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 20px;
        }
        .panel + .panel { margin-top: 18px; }
        .panel h2 { margin: 0 0 14px; font-size: 1.08rem; }
        label { display: block; margin: 12px 0 7px; color: #344054; font-weight: 850; }
        input {
            width: 100%;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 0 12px;
            font: inherit;
            background: #fbfdff;
            color: var(--ink);
        }
        input:focus {
            outline: 3px solid rgba(37, 99, 235, 0.14);
            border-color: var(--brand);
        }
        .form-actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 720px;
            background: white;
        }
        th, td {
            padding: 13px 14px;
            text-align: left;
            border-bottom: 1px solid #e7edf6;
            vertical-align: top;
        }
        th {
            background: #f8fafc;
            color: #344054;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        tr:last-child td { border-bottom: 0; }
        .room-id {
            display: inline-flex;
            min-width: 34px;
            height: 28px;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: #eaf1ff;
            color: var(--brand-dark);
            font-weight: 900;
        }
        .empty {
            padding: 28px;
            color: var(--muted);
            text-align: center;
        }
        @media (max-width: 980px) {
            .grid { grid-template-columns: 1fr; }
            .page-head { align-items: flex-start; flex-direction: column; }
            .nav { align-items: flex-start; flex-direction: column; gap: 14px; padding-top: 16px; padding-bottom: 16px; }
        }
        @media (max-width: 560px) {
            .nav-actions, .btn { width: 100%; }
            .form-actions .btn { flex: 1 1 100%; }
        }
    </style>
</head>
<body>
    <header class="nav">
        <div class="brand"><div class="brand-mark">SC</div><span>Rooms Dashboard</span></div>
        <nav class="nav-actions" id="navbarLinks"></nav>
    </header>

    <main class="page">
        <div class="page-head">
            <div>
                <h1>Campus Rooms</h1>
                <p class="subtle">Create rooms, search by capacity, and update room details from one dashboard.</p>
            </div>
            <button id="loadBtn" class="btn btn-primary" type="button">Load Rooms</button>
        </div>

        <div id="message" class="message"></div>

        <section class="grid">
            <aside>
                <div class="panel" id="createRoomPanel">
                    <h2>Create Room</h2>
                    <form id="createRoomForm">
                        <label for="create_room_number">Room number</label>
                        <input id="create_room_number" required placeholder="B401" />

                        <label for="create_capacity">Capacity</label>
                        <input id="create_capacity" type="number" min="1" required placeholder="45" />

                        <label for="create_building_id">Building ID</label>
                        <input id="create_building_id" required placeholder="1" />

                        <label for="create_description">Description</label>
                        <input id="create_description" required placeholder="Updated lecture room" />

                        <div class="form-actions">
                            <button class="btn btn-primary" type="submit">Create</button>
                        </div>
                    </form>
                </div>

                <div class="panel">
                    <h2>Search by Capacity</h2>
                    <form id="searchRoomForm">
                        <label for="search_capacity">Minimum capacity</label>
                        <input id="search_capacity" type="number" min="1" required placeholder="40" />
                        <div class="form-actions">
                            <button class="btn btn-teal" type="submit">Search</button>
                            <button id="resetSearchBtn" class="btn" type="button">All Rooms</button>
                        </div>
                    </form>
                </div>

                <div class="panel" id="updateRoomPanel">
                    <h2>Update Room</h2>
                    <form id="updateRoomForm">
                        <label for="update_room_id">Room ID</label>
                        <input id="update_room_id" type="number" min="1" required placeholder="3" />

                        <label for="update_room_number">Room number</label>
                        <input id="update_room_number" required placeholder="B401" />

                        <label for="update_capacity">Capacity</label>
                        <input id="update_capacity" type="number" min="1" required placeholder="45" />

                        <label for="update_building_id">Building ID</label>
                        <input id="update_building_id" required placeholder="1" />

                        <label for="update_description">Description</label>
                        <input id="update_description" required placeholder="Updated lecture room" />

                        <div class="form-actions">
                            <button class="btn btn-primary" type="submit">Update</button>
                        </div>
                    </form>
                </div>
            </aside>

            <section class="panel">
                <h2 id="roomsTitle">Rooms</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Room number</th>
                                <th>Capacity</th>
                                <th>Building ID</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody id="roomsBody">
                            <tr><td class="empty" colspan="5">Load rooms to begin.</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

    <script>
        const token = localStorage.getItem('sc_token');
        const navbarLinks = document.getElementById('navbarLinks');
        const message = document.getElementById('message');
        const roomsBody = document.getElementById('roomsBody');
        const roomsTitle = document.getElementById('roomsTitle');
        const pageSubtitle = document.querySelector('.page-head .subtle');

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
        }

        function clearMessage() {
            message.className = 'message';
            message.textContent = '';
        }

        function renderNavbar(isAdmin = false) {
            if (token) {
                navbarLinks.innerHTML = `
                    <a class="btn" href="/">Home</a>
                    <a class="btn" href="/rooms-ui">Rooms</a>
                    <a class="btn" href="/bookings-ui">My Bookings</a>
                    <a class="btn" href="/profile">Profile</a>
                    ${isAdmin ? '' : ''}
                    <button id="logoutBtn" class="btn btn-danger" type="button">Logout</button>
                `;
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    localStorage.removeItem('sc_token');
                    window.location.href = '/login';
                });
            } else {
                navbarLinks.innerHTML = `
                    <a class="btn" href="/">Home</a>
                    <a class="btn btn-primary" href="/login">Login</a>
                `;
            }
        }

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + localStorage.getItem('sc_token')
            };
        }

        async function parseResponse(res) {
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                throw new Error(data.error || data.message || 'Request failed');
            }
            return data;
        }

        function roomValue(room, snake, camel) {
            return room[snake] ?? room[camel] ?? '';
        }

        function getRooms(data) {
            return data.rooms || data.Rooms || [];
        }

        async function loadUserRole() {
            try {
                const profileRes = await fetch('/api/profile', { headers: authHeaders() });
                const profile = await parseResponse(profileRes);
                const isAdmin = String(profile.role).toLowerCase() === 'admin';
                if (!isAdmin) {
                    document.getElementById('createRoomPanel').style.display = 'none';
                    document.getElementById('updateRoomPanel').style.display = 'none';
                    if (pageSubtitle) {
                        pageSubtitle.textContent = 'Search rooms by capacity and view room details. Room creation and update are reserved for admins.';
                    }
                }
                return isAdmin;
            } catch (error) {
                showMessage(error.message, 'error');
                return false;
            }
        }

        function renderRooms(data, title) {
            const rooms = getRooms(data);
            roomsTitle.textContent = title || 'Rooms';
            roomsBody.innerHTML = '';

            if (!rooms.length) {
                roomsBody.innerHTML = '<tr><td class="empty" colspan="6">No rooms found.</td></tr>';
                return;
            }

            rooms.forEach((room) => {
                const row = document.createElement('tr');
                const description = roomValue(room, 'room_type', 'roomType') || roomValue(room, 'description', 'description');
                row.innerHTML = `
                    <td><span class="room-id">${roomValue(room, 'id', 'id')}</span></td>
                    <td><strong>${roomValue(room, 'room_number', 'roomNumber')}</strong></td>
                    <td>${roomValue(room, 'capacity', 'capacity')}</td>
                    <td>${roomValue(room, 'building_id', 'buildingId')}</td>
                    <td>${description}</td>
                `;
                roomsBody.appendChild(row);
            });
        }

        async function loadRooms(title) {
            clearMessage();
            const res = await fetch('/rooms', { headers: authHeaders() });
            const data = await parseResponse(res);
            renderRooms(data, title || 'Rooms');
            return data;
        }

        async function initPage() {
            const isAdmin = await loadUserRole();
            await loadRooms().catch((error) => showMessage(error.message, 'error'));
            if (!isAdmin) {
                showMessage('Room creation and update are available to admins only.', 'info');
            }
        }

        renderNavbar();

        if (!token) {
            showMessage('Please login first. Redirecting to login...', 'info');
            setTimeout(() => {
                window.location.href = '/login';
            }, 1200);
        } else {
            initPage();
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('sc_token');
            window.location.href = '/login';
        });

        document.getElementById('loadBtn').addEventListener('click', () => {
            loadRooms().catch((error) => showMessage(error.message, 'error'));
        });

        document.getElementById('resetSearchBtn').addEventListener('click', () => {
            document.getElementById('search_capacity').value = '';
            loadRooms().catch((error) => showMessage(error.message, 'error'));
        });

        document.getElementById('createRoomForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            clearMessage();

            const body = {
                room_number: document.getElementById('create_room_number').value.trim(),
                capacity: Number(document.getElementById('create_capacity').value),
                building_id: document.getElementById('create_building_id').value.trim(),
                description: document.getElementById('create_description').value.trim()
            };

            try {
                const res = await fetch('/rooms', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify(body)
                });
                await parseResponse(res);
                showMessage('Room created successfully.', 'success');
                event.target.reset();
                await loadRooms();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        document.getElementById('searchRoomForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            clearMessage();
            const capacity = document.getElementById('search_capacity').value;

            try {
                const res = await fetch('/rooms/search?capacity=' + encodeURIComponent(capacity), {
                    headers: authHeaders()
                });
                const data = await parseResponse(res);
                renderRooms(data, 'Rooms with capacity ' + capacity + '+');
                showMessage('Search completed.', 'success');
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        document.getElementById('updateRoomForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            clearMessage();
            const id = document.getElementById('update_room_id').value;
            const body = {
                room_number: document.getElementById('update_room_number').value.trim(),
                capacity: Number(document.getElementById('update_capacity').value),
                building_id: document.getElementById('update_building_id').value.trim(),
                description: document.getElementById('update_description').value.trim()
            };

            try {
                const res = await fetch('/rooms/' + encodeURIComponent(id), {
                    method: 'PUT',
                    headers: authHeaders(),
                    body: JSON.stringify(body)
                });
                await parseResponse(res);
                showMessage('Room updated successfully.', 'success');
                event.target.reset();
                await loadRooms();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });
    </script>
</body>
</html>
