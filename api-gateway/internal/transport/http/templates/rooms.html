<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rooms - Smart Campus</title>
    <style>
        :root {
            --bg: #eef5ff;
            --sidebar: #fbfdff;
            --card: #fbfcff;
            --text: #2d3748;
            --muted: #8da0bd;
            --line: #dde8f6;
            --blue: #5b9dec;
            --teal: #65c8a7;
            --danger: #ef4444;
            --success: #15803d;
            --shadow: 0 16px 40px rgba(61, 83, 120, 0.08);
            --radius: 22px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .app { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }
        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            padding: 28px 20px;
            background: var(--sidebar);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            gap: 34px;
        }
        .brand { display: flex; align-items: center; gap: 14px; font-size: 1.25rem; font-weight: 900; text-decoration: none; color: var(--text); }
        .brand-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            color: white;
            background: linear-gradient(135deg, var(--blue), var(--teal));
            font-weight: 900;
        }
        .nav { display: grid; gap: 10px; }
        .nav a, .logout {
            min-height: 52px;
            padding: 0 16px;
            border: 0;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: transparent;
            color: #617492;
            font: inherit;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            transition: 0.18s ease;
        }
        .nav a:hover, .logout:hover { background: #edf5ff; color: var(--text); }
        .nav a.active { background: #e4effc; color: var(--text); outline: 2px solid #111827; }
        .logout { margin-top: auto; color: var(--danger); }
        .admin-only, .private-link { display: none; }
        .auth-links, .user-card { margin-top: auto; display: grid; gap: 10px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; }
        .user-card{display:none;padding:16px;border-radius:18px;background:#f4f9ff;border:1px solid var(--line)}
        .user-card strong{display:block}
        .user-card span{color:var(--muted);font-weight:750;font-size:.9rem}
        .main { min-width: 0; }
        .topbar {
            height: 72px;
            border-bottom: 1px solid var(--line);
            background: rgba(251, 253, 255, 0.84);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 28px;
        }
        .bell { font-size: 1.35rem; color: #617492; }
        .content { width: min(1280px, calc(100% - 64px)); margin: 0 auto; padding: 36px 0 64px; }
        .page-head { margin-bottom: 26px; }
        h1 { margin: 0; font-size: clamp(2rem, 3vw, 2.75rem); line-height: 1; }
        .subtle { color: var(--muted); margin: 10px 0 0; font-size: 1.05rem; font-weight: 650; }
        .alert {
            display: none;
            margin: 0 0 18px;
            padding: 14px 16px;
            border-radius: 16px;
            font-weight: 800;
        }
        .alert.error { display: block; color: #b42318; background: #fef3f2; border: 1px solid #fecdca; }
        .alert.success { display: block; color: var(--success); background: #ecfdf3; border: 1px solid #abefc6; }
        .alert.info { display: block; color: #1d4ed8; background: #eff6ff; border: 1px solid #bfdbfe; }
        .filter-card, .modal-card, .room-card {
            background: var(--card);
            border: 1px solid #edf3fb;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .filter-card { padding: 22px; margin-bottom: 26px; }
        .filter-grid {
            display: grid;
            grid-template-columns: 1.4fr 220px auto;
            gap: 16px;
            align-items: end;
        }
        label { display: block; color: #617492; font-weight: 850; margin-bottom: 8px; }
        input {
            width: 100%;
            min-height: 50px;
            border: 1px solid #d8e5f5;
            border-radius: 16px;
            padding: 0 16px;
            background: white;
            color: var(--text);
            font: inherit;
        }
        input:focus { outline: 0; border-color: #8bc1ff; box-shadow: 0 0 0 4px rgba(91, 157, 236, 0.16); }
        .btn {
            min-height: 50px;
            border: 0;
            border-radius: 16px;
            padding: 0 20px;
            font: inherit;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
        .btn-primary, .btn.primary { color: white; background: linear-gradient(135deg, var(--blue), var(--teal)); }
        .btn-soft { color: #1d4ed8; background: #e8f2ff; }
        .btn:disabled { opacity: 0.65; cursor: wait; transform: none; }
        .layout { display: block; }
        .rooms-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
        .room-card { padding: 26px; }
        .room-top { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 16px; }
        .room-card h3 { margin: 0 0 6px; font-size: 1.08rem; }
        .room-card p { margin: 0; color: var(--muted); font-weight: 700; }
        .slots { padding: 8px 12px; border-radius: 999px; background: #dcfce7; color: #166534; font-weight: 850; white-space: nowrap; }
        .room-meta { display: flex; gap: 14px; color: #617492; margin: 18px 0 22px; font-weight: 800; flex-wrap: wrap; }
        .room-card .btn { width: 100%; }
        .modal-backdrop { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 28px; background: rgba(28, 44, 70, .28); z-index: 50; }
        .modal-backdrop.open { display: flex; }
        .modal-card { width: min(840px, 100%); padding: 30px; }
        .modal-head { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 24px; }
        .modal-icon { width: 62px; height: 62px; border-radius: 18px; display: grid; place-items: center; color: white; background: linear-gradient(135deg, var(--blue), var(--teal)); font-weight: 900; }
        .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .time-chip { min-height: 42px; border: 1px solid #d8e5f5; border-radius: 14px; background: white; color: var(--text); font-weight: 850; cursor: pointer; }
        .time-chip.selected { border-color: #8bc1ff; background: #edf7ff; }
        .form-grid { display: grid; gap: 14px; }
        .empty {
            min-height: 220px;
            display: grid;
            place-items: center;
            color: var(--muted);
            font-weight: 800;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px dashed #cbd9ee;
        }
        @media (max-width: 1180px) {
            .layout { grid-template-columns: 1fr; }
            .rooms-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 820px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { position: static; height: auto; }
            .content { width: min(100% - 28px, 1280px); }
            .filter-grid, .rooms-grid, .time-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <a class="brand" href="/"><span class="brand-icon">SC</span><span>Smart Campus</span></a>
            <nav class="nav">
                <a href="/">▦ Dashboard</a>
                <a class="active" href="/rooms-ui">▥ Rooms</a>
                <a class="private-link" href="/bookings-ui">▣ My Bookings</a>
                <a class="private-link" href="/profile-ui">♙ Profile</a>
                <a class="admin-only" href="/admin-ui">◇ Admin</a>
            </nav>
            <div id="authLinks" class="auth-links">
                <a class="btn primary" href="/login">Login</a>
                <a class="btn" href="/register">Register</a>
            </div>
            <div id="userCard" class="user-card">
                <strong id="sideName">User</strong>
                <span id="sideRole">Role</span>
                <button id="logoutBtn" class="btn btn-danger" type="button">Logout</button>
            </div>
        </aside>

        <main class="main">
            <div class="topbar"><span class="bell">♢</span></div>
            <section class="content">
                <header class="page-head">
                    <h1>Find a Room</h1>
                    <p class="subtle">Browse available spaces on campus and reserve a room.</p>
                </header>

                <div id="message" class="alert"></div>

                <section class="filter-card">
                    <form id="searchRoomForm" class="filter-grid">
                        <div>
                            <label for="booking_date">Date</label>
                            <input id="booking_date" type="date" />
                        </div>
                        <div>
                            <label for="search_capacity">Min Capacity</label>
                            <input id="search_capacity" type="number" min="1" placeholder="Any" />
                        </div>
                        <div style="display:flex;gap:10px;flex-wrap:wrap">
                            <button class="btn btn-primary" type="submit">Search</button>
                            <button id="resetSearchBtn" class="btn btn-soft" type="button">All</button>
                        </div>
                    </form>
                </section>

                <section class="layout">
                    <div id="roomsGrid" class="rooms-grid"></div>
                </section>
            </section>
        </main>
    </div>

    <div id="bookingModal" class="modal-backdrop">
        <section class="modal-card">
            <button id="closeModalBtn" class="btn btn-soft" type="button">← Back to Rooms</button>
            <div class="modal-head">
                <div class="modal-icon">▥</div>
                <div>
                    <h2 id="modalRoomTitle">Room</h2>
                    <p id="modalRoomMeta" class="subtle">Select start and end times</p>
                </div>
            </div>
            <form id="createBookingForm" class="form-grid">
                <input id="create_user_id" type="hidden" />
                <input id="create_room_id" type="hidden" />
                <div><label>Date</label><input id="booking_modal_date" type="date" required /></div>
                <div><label>Select start time</label><div id="startTimes" class="time-grid"></div></div>
                <div><label>Select end time</label><div id="endTimes" class="time-grid"></div></div>
                <div><label for="create_purpose">Booking Purpose</label><input id="create_purpose" required placeholder="e.g. Team meeting, study session..." /></div>
                <input id="create_start_time" type="hidden" />
                <input id="create_end_time" type="hidden" />
                <button class="btn btn-primary" type="submit">Confirm Booking</button>
            </form>
        </section>
    </div>

    <script>
        const token = localStorage.getItem('sc_token');
        const user = decodeToken();
        const message = document.getElementById('message');
        const roomsGrid = document.getElementById('roomsGrid');
        const modal = document.getElementById('bookingModal');
        const times = ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00'];
        let selectedStart = '';
        let selectedEnd = '';

        function decodeToken(){if(!token)return null;try{const base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');return JSON.parse(decodeURIComponent(escape(atob(base64))))}catch(e){return null}}
        function displayName(user){return localStorage.getItem('sc_full_name')|| (user && user.email ? user.email.split('@')[0] : 'User')}
        function showMessage(text, type) { message.textContent = text; message.className = 'alert ' + type; }
        function clearMessage() { message.className = 'alert'; message.textContent = ''; }
        function authHeaders() {
            const headers = { 'Content-Type': 'application/json' };
            if (token) { headers.Authorization = 'Bearer ' + token; }
            return headers;
        }
        function setLoading(button, loading, text) {
            if (!button) return;
            if (loading) { button.dataset.originalText = button.textContent; button.textContent = text || 'Loading...'; button.disabled = true; return; }
            button.textContent = button.dataset.originalText || button.textContent; button.disabled = false;
        }
        async function parseResponse(res) {
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.error || data.message || 'Request failed');
            return data;
        }
        function roomValue(room, snake, camel) { return room[snake] ?? room[camel] ?? ''; }
        function getRooms(data) { return data.rooms || data.Rooms || []; }
        function renderRooms(data) {
            const rooms = getRooms(data);
            roomsGrid.innerHTML = '';
            if (!rooms.length) { roomsGrid.innerHTML = '<div class="empty">No rooms found.</div>'; return; }
            rooms.forEach((room) => {
                const id = roomValue(room, 'id', 'id');
                const number = roomValue(room, 'room_number', 'roomNumber') || 'Room ' + id;
                const capacity = roomValue(room, 'capacity', 'capacity') || 0;
                const building = roomValue(room, 'building_id', 'buildingId') || '-';
                const description = roomValue(room, 'room_type', 'roomType') || roomValue(room, 'description', 'description') || 'Campus room';
                const card = document.createElement('article');
                card.className = 'room-card';
                card.innerHTML = `
                    <div class="room-top">
                        <div><h3>${number}</h3><p>${description}</p></div>
                        <span class="slots">Available</span>
                    </div>
                    <div class="room-meta"><span>♙ ${capacity}</span><span>Building ${building}</span><span>ID ${id}</span></div>
                    <button class="btn btn-primary" type="button" data-room-id="${id}">Book Now</button>
                `;
                card.querySelector('button').addEventListener('click', () => {
                    if (!user) {
                        showMessage('Login or register to book rooms.', 'info');
                        setTimeout(() => { window.location.href = '/login'; }, 1200);
                        return;
                    }
                    openBookingModal({ id, number, capacity, building });
                });
                roomsGrid.appendChild(card);
            });
        }
        async function loadRooms(button) {
            clearMessage();
            setLoading(button, true, 'Loading...');
            try {
                const res = await fetch('/rooms', { headers: authHeaders() });
                renderRooms(await parseResponse(res));
            } catch (error) {
                showMessage(error.message, 'error');
            } finally { setLoading(button, false); }
        }
        function toISOStringFromDateTime(date, time) { return new Date(date + 'T' + time + ':00').toISOString(); }
        function renderTimeButtons(containerID, selected, onSelect) {
            const container = document.getElementById(containerID);
            container.innerHTML = '';
            times.forEach((time) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'time-chip' + (selected === time ? ' selected' : '');
                btn.textContent = time;
                btn.addEventListener('click', () => onSelect(time));
                container.appendChild(btn);
            });
        }
        function refreshTimes() {
            renderTimeButtons('startTimes', selectedStart, (time) => { selectedStart = time; document.getElementById('create_start_time').value = time; refreshTimes(); });
            renderTimeButtons('endTimes', selectedEnd, (time) => { selectedEnd = time; document.getElementById('create_end_time').value = time; refreshTimes(); });
        }
        function openBookingModal(room) {
            const user = decodeToken();
            if (!user) {
                showMessage('Please login to book a room.', 'info');
                setTimeout(() => { window.location.href = '/login'; }, 600);
                return;
            }
            document.getElementById('create_user_id').value = user.user_id;
            document.getElementById('create_room_id').value = room.id;
            document.getElementById('modalRoomTitle').textContent = room.number;
            document.getElementById('modalRoomMeta').textContent = room.capacity + ' people · Building ' + room.building;
            document.getElementById('booking_modal_date').value = document.getElementById('booking_date').value || new Date().toISOString().slice(0, 10);
            selectedStart = '';
            selectedEnd = '';
            document.getElementById('create_purpose').value = '';
            refreshTimes();
            modal.classList.add('open');
        }
        function closeBookingModal() { modal.classList.remove('open'); }

        const authLinks = document.getElementById('authLinks');
        const userCard = document.getElementById('userCard');
        const logoutBtn = document.getElementById('logoutBtn');
        if (user) {
            authLinks.style.display = 'none';
            userCard.style.display = 'grid';
            document.getElementById('sideName').textContent = displayName(user);
            document.getElementById('sideRole').textContent = String(user.role||'Student');
            document.querySelectorAll('.private-link').forEach((el) => el.style.display = 'flex');
            if (String(user.role||'').toUpperCase()==='ADMIN') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
                document.querySelectorAll('a[href="/bookings-ui"]').forEach(el => {
                    const h3 = el.querySelector && el.querySelector('h3');
                    if (h3) h3.textContent = 'All Bookings';
                    else el.textContent = '▣ All Bookings';
                });
            } else {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            }
            const today = new Date().toISOString().slice(0, 10);
            document.getElementById('booking_date').value = today;
            loadRooms().catch((error) => showMessage(error.message, 'error'));
        } else {
            authLinks.style.display = 'grid';
            userCard.style.display = 'none';
            logoutBtn.style.display = 'none';
            document.querySelectorAll('.private-link').forEach((el) => el.style.display = 'none');
            document.querySelectorAll('.admin-only').forEach((el) => el.style.display = 'none');
            loadRooms().catch((error) => showMessage(error.message, 'error'));
            showMessage('Rooms page is available for all. Login to book rooms.', 'info');
        }
        if (logoutBtn) { logoutBtn.addEventListener('click', () => { localStorage.removeItem('sc_token'); localStorage.removeItem('sc_user'); window.location.href = '/login'; }); }
        document.getElementById('closeModalBtn').addEventListener('click', closeBookingModal);
        modal.addEventListener('click', (event) => { if (event.target === modal) closeBookingModal(); });
        document.getElementById('resetSearchBtn').addEventListener('click', (event) => {
            document.getElementById('search_capacity').value = '';
            loadRooms(event.currentTarget).catch((error) => showMessage(error.message, 'error'));
        });
        document.getElementById('searchRoomForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            clearMessage();
            const button = event.submitter;
            const capacity = document.getElementById('search_capacity').value;
            if (!capacity) { loadRooms(button).catch((error) => showMessage(error.message, 'error')); return; }
            setLoading(button, true, 'Searching...');
            try {
                const res = await fetch('/rooms/search?capacity=' + encodeURIComponent(capacity), { headers: authHeaders() });
                renderRooms(await parseResponse(res));
                showMessage('Rooms filtered by capacity.', 'success');
            } catch (error) { showMessage(error.message, 'error'); }
            finally { setLoading(button, false); }
        });
        document.getElementById('createBookingForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            clearMessage();
            const button = event.submitter;
            setLoading(button, true, 'Booking...');
            if (!selectedStart || !selectedEnd) {
                showMessage('Please select start and end times.', 'error');
                setLoading(button, false);
                return;
            }
            const body = {
                user_id: Number(document.getElementById('create_user_id').value),
                room_id: Number(document.getElementById('create_room_id').value),
                start_time: toISOStringFromDateTime(document.getElementById('booking_modal_date').value, selectedStart),
                end_time: toISOStringFromDateTime(document.getElementById('booking_modal_date').value, selectedEnd),
                purpose: document.getElementById('create_purpose').value.trim()
            };
            try {
                const res = await fetch('/bookings', { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
                await parseResponse(res);
                showMessage('Booking created successfully.', 'success');
                closeBookingModal();
                event.target.reset();
            } catch (error) { showMessage(error.message, 'error'); }
            finally { setLoading(button, false); }
        });
    </script>
</body>
</html>
