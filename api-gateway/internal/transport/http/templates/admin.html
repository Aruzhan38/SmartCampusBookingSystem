<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Smart Campus</title>
    <style>
        :root { --bg:#eef5ff; --sidebar:#fbfdff; --card:#fbfcff; --text:#2d3748; --muted:#8da0bd; --line:#dde8f6; --blue:#5b9dec; --teal:#65c8a7; --danger:#ef4444; --amber:#b45309; --success:#15803d; --shadow:0 16px 40px rgba(61,83,120,.08); --radius:22px; }
        *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
        .app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;padding:28px 20px;background:var(--sidebar);border-right:1px solid var(--line);display:flex;flex-direction:column;gap:34px}
        .brand{display:flex;align-items:center;gap:14px;font-size:1.25rem;font-weight:900;text-decoration:none;color:var(--text)}.brand-icon{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;color:white;background:linear-gradient(135deg,var(--blue),var(--teal));font-weight:900}
        .nav{display:grid;gap:10px}.nav a,.logout{min-height:52px;padding:0 16px;border:0;border-radius:16px;display:flex;align-items:center;gap:14px;background:transparent;color:#617492;font:inherit;font-weight:800;text-decoration:none;cursor:pointer}.nav a:hover,.logout:hover{background:#edf5ff;color:var(--text)}.nav a.active{background:#e4effc;color:var(--text);outline:2px solid #111827}.logout{margin-top:auto;color:var(--danger)}
        .main{min-width:0}.topbar{height:72px;border-bottom:1px solid var(--line);background:rgba(251,253,255,.84);display:flex;justify-content:flex-end;align-items:center;padding:0 28px}.content{width:min(1120px,calc(100% - 64px));margin:0 auto;padding:36px 0 64px}
        h1{margin:0;font-size:clamp(2rem,3vw,2.4rem)}.subtle{color:var(--muted);margin:8px 0 28px;font-size:1.05rem;font-weight:650}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px}.card{background:var(--card);border:1px solid #edf3fb;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}.card h2{margin:0 0 16px}
        label{display:block;color:#617492;font-weight:850;margin:12px 0 8px}input,select{width:100%;min-height:48px;border:1px solid #d8e5f5;border-radius:16px;padding:0 16px;background:white;color:var(--text);font:inherit}input:focus,select:focus{outline:0;border-color:#8bc1ff;box-shadow:0 0 0 4px rgba(91,157,236,.16)}
        .btn{min-height:48px;border:0;border-radius:16px;padding:0 20px;margin-top:16px;font:inherit;font-weight:900;cursor:pointer}.btn-primary{color:white;background:linear-gradient(135deg,var(--blue),var(--teal))}.btn-amber{color:var(--amber);background:#ffedd5}.alert{display:none;margin:0 0 18px;padding:14px 16px;border-radius:16px;font-weight:800}.alert.error{display:block;color:#b42318;background:#fef3f2;border:1px solid #fecdca}.alert.success{display:block;color:var(--success);background:#ecfdf3;border:1px solid #abefc6}.alert.info{display:block;color:#1d4ed8;background:#eff6ff;border:1px solid #bfdbfe}
        @media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.content{width:min(100% - 28px,1120px)}.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <a class="brand" href="/"><span class="brand-icon">SC</span><span>Smart Campus</span></a>
            <nav class="nav">
                <a href="/">▦ Dashboard</a>
                <a href="/rooms-ui">▥ Rooms</a>
                <a href="/bookings-ui">▣ My Bookings</a>
                <a class="active" href="/admin-ui">◇ Admin</a>
            </nav>
            <button id="logoutBtn" class="logout" type="button">↪ Logout</button>
        </aside>
        <main class="main">
            <div class="topbar">♢</div>
            <section class="content">
                <h1>Admin Panel</h1>
                <p class="subtle">Manage rooms and booking statuses. This page is separated from the student and teacher flow.</p>
                <div id="message" class="alert"></div>
                <section class="grid">
                    <div class="card">
                        <h2>Create Room</h2>
                        <form id="createRoomForm">
                            <label for="create_room_number">Room number</label><input id="create_room_number" required placeholder="B401" />
                            <label for="create_capacity">Capacity</label><input id="create_capacity" type="number" min="1" required placeholder="45" />
                            <label for="create_building_id">Building ID</label><input id="create_building_id" required placeholder="1" />
                            <label for="create_description">Description</label><input id="create_description" required placeholder="Lecture room" />
                            <button class="btn btn-primary" type="submit">Create Room</button>
                        </form>
                    </div>
                    <div class="card">
                        <h2>Update Room</h2>
                        <form id="updateRoomForm">
                            <label for="update_room_id">Room ID</label><input id="update_room_id" type="number" min="1" required placeholder="3" />
                            <label for="update_room_number">Room number</label><input id="update_room_number" required placeholder="B401" />
                            <label for="update_capacity">Capacity</label><input id="update_capacity" type="number" min="1" required placeholder="45" />
                            <label for="update_building_id">Building ID</label><input id="update_building_id" required placeholder="1" />
                            <label for="update_description">Description</label><input id="update_description" required placeholder="Updated lecture room" />
                            <button class="btn btn-primary" type="submit">Update Room</button>
                        </form>
                    </div>
                    <div class="card">
                        <h2>Update Booking Status</h2>
                        <form id="statusBookingForm">
                            <label for="status_booking_id">Booking ID</label><input id="status_booking_id" type="number" min="1" required placeholder="8" />
                            <label for="booking_status">Status</label>
                            <select id="booking_status" required>
                                <option value="CONFIRMED">Confirmed</option>
                                <option value="CANCELLED">Cancelled</option>
                                <option value="REJECTED">Rejected</option>
                            </select>
                            <button class="btn btn-amber" type="submit">Update Status</button>
                        </form>
                    </div>
                </section>
            </section>
        </main>
    </div>
    <script>
        const token = localStorage.getItem('sc_token');
        const message = document.getElementById('message');
        function showMessage(text,type){message.textContent=text;message.className='alert '+type}
        function clearMessage(){message.className='alert';message.textContent=''}
        function authHeaders(){return {'Content-Type':'application/json',Authorization:'Bearer '+localStorage.getItem('sc_token')}}
        async function parseResponse(res){const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.error||data.message||'Request failed');return data}
        function decodeToken(){if(!token)return null;try{const base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');return JSON.parse(decodeURIComponent(escape(atob(base64))))}catch(e){return null}}
        const user=decodeToken();
        if(!token||!user){showMessage('Please login first. Redirecting to login...','info');setTimeout(()=>{window.location.href='/login'},1200)}
        else if(String(user.role||'').toUpperCase()!=='ADMIN'){showMessage('Admin access only. Redirecting to rooms...','error');setTimeout(()=>{window.location.href='/rooms-ui'},1200)}
        document.querySelectorAll('a[href="/bookings-ui"]').forEach(el => {
            const h3 = el.querySelector && el.querySelector('h3');
            if (h3) h3.textContent = 'All Bookings';
            else el.textContent = '▣ All Bookings';
        });
        document.getElementById('logoutBtn').addEventListener('click',()=>{localStorage.removeItem('sc_token');window.location.href='/login'})
        document.getElementById('createRoomForm').addEventListener('submit',async(event)=>{event.preventDefault();clearMessage();const body={room_number:document.getElementById('create_room_number').value.trim(),capacity:Number(document.getElementById('create_capacity').value),building_id:document.getElementById('create_building_id').value.trim(),description:document.getElementById('create_description').value.trim()};try{const res=await fetch('/rooms',{method:'POST',headers:authHeaders(),body:JSON.stringify(body)});await parseResponse(res);showMessage('Room created successfully.','success');event.target.reset()}catch(error){showMessage(error.message,'error')}})
        document.getElementById('updateRoomForm').addEventListener('submit',async(event)=>{event.preventDefault();clearMessage();const id=document.getElementById('update_room_id').value;const body={room_number:document.getElementById('update_room_number').value.trim(),capacity:Number(document.getElementById('update_capacity').value),building_id:document.getElementById('update_building_id').value.trim(),description:document.getElementById('update_description').value.trim()};try{const res=await fetch('/rooms/'+encodeURIComponent(id),{method:'PUT',headers:authHeaders(),body:JSON.stringify(body)});await parseResponse(res);showMessage('Room updated successfully.','success');event.target.reset()}catch(error){showMessage(error.message,'error')}})
        document.getElementById('statusBookingForm').addEventListener('submit',async(event)=>{event.preventDefault();clearMessage();const id=document.getElementById('status_booking_id').value;const status=document.getElementById('booking_status').value;try{const res=await fetch('/bookings/'+encodeURIComponent(id)+'/status',{method:'PATCH',headers:authHeaders(),body:JSON.stringify({status})});await parseResponse(res);showMessage('Booking status updated successfully.','success');event.target.reset()}catch(error){showMessage(error.message,'error')}})
    </script>
</body>
</html>
