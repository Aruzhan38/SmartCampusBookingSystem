<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Smart Campus</title>
    <style>
        :root { --bg:#eef5ff; --sidebar:#fbfdff; --card:#fbfcff; --text:#2d3748; --muted:#8da0bd; --line:#dde8f6; --blue:#5b9dec; --teal:#65c8a7; --danger:#ef4444; --shadow:0 16px 40px rgba(61,83,120,.08); --radius:22px; }
        *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
        .app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;padding:28px 20px;background:var(--sidebar);border-right:1px solid var(--line);display:flex;flex-direction:column;gap:34px}
        .brand{display:flex;align-items:center;gap:14px;font-size:1.25rem;font-weight:900;text-decoration:none;color:var(--text)}.brand-icon,.avatar{border-radius:16px;display:grid;place-items:center;color:white;background:linear-gradient(135deg,var(--blue),var(--teal));font-weight:900}.brand-icon{width:48px;height:48px}.avatar{width:92px;height:92px;font-size:2rem}
        .nav{display:grid;gap:10px}.nav a,.logout{min-height:52px;padding:0 16px;border:0;border-radius:16px;display:flex;align-items:center;gap:14px;background:transparent;color:#617492;font:inherit;font-weight:800;text-decoration:none;cursor:pointer}.nav a:hover,.logout:hover{background:#edf5ff;color:var(--text)}.nav a.active{background:#e4effc;color:var(--text);outline:2px solid #111827}.logout{margin-top:auto;color:var(--danger)}
        .user-mini{margin-top:auto;padding:16px;border-radius:18px;background:#f4f9ff;border:1px solid var(--line)}.user-mini strong{display:block}.user-mini span{color:var(--muted);font-weight:750;font-size:.9rem}
        .main{min-width:0}.topbar{height:72px;border-bottom:1px solid var(--line);background:rgba(251,253,255,.84);display:flex;justify-content:flex-end;align-items:center;padding:0 28px}.content{width:min(900px,calc(100% - 64px));margin:0 auto;padding:36px 0 64px}
        h1{margin:0;font-size:clamp(2rem,3vw,2.4rem)}.subtle{color:var(--muted);margin:8px 0 28px;font-size:1.05rem;font-weight:650}.card{background:var(--card);border:1px solid #edf3fb;border-radius:var(--radius);box-shadow:var(--shadow);padding:30px}.profile-head{display:flex;gap:20px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:26px;margin-bottom:26px}.details{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.detail{padding:18px;border-radius:18px;background:#f7fbff;border:1px solid var(--line)}.detail span{display:block;color:var(--muted);font-weight:800;margin-bottom:8px}.detail strong{font-size:1.05rem}.admin-only{display:none}
        @media(max-width:820px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.content{width:min(100% - 28px,900px)}.details{grid-template-columns:1fr}.profile-head{align-items:flex-start;flex-direction:column}}
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <a class="brand" href="/"><span class="brand-icon">SC</span><span>Smart Campus</span></a>
            <nav class="nav">
                <a href="/">▦ Dashboard</a>
                <a href="/rooms-ui">▥ Rooms</a>
                <a href="/bookings-ui">▣ My Bookings</a>
                <a class="active" href="/profile-ui">♙ Profile</a>
                <a class="admin-only" href="/admin-ui">◇ Admin</a>
            </nav>
            <div class="user-mini"><strong id="sideName">User</strong><span id="sideRole">Role</span></div>
            <button id="logoutBtn" class="logout" type="button">↪ Logout</button>
        </aside>
        <main class="main">
            <div class="topbar">♢</div>
            <section class="content">
                <h1>My Profile</h1>
                <p class="subtle">Your campus booking account.</p>
                <article class="card">
                    <div class="profile-head">
                        <div id="avatar" class="avatar">SC</div>
                        <div>
                            <h2 id="profileName">User</h2>
                            <p id="profileSubtitle" class="subtle">Campus account</p>
                        </div>
                    </div>
                    <div class="details">
                        <div class="detail"><span>User ID</span><strong id="profileID">-</strong></div>
                        <div class="detail"><span>Email</span><strong id="profileEmail">-</strong></div>
                        <div class="detail"><span>Role</span><strong id="profileRole">-</strong></div>
                    </div>
                </article>
            </section>
        </main>
    </div>
    <script>
        function decodeToken(){const token=localStorage.getItem('sc_token');if(!token)return null;try{const base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');return JSON.parse(decodeURIComponent(escape(atob(base64))))}catch(e){return null}}
        function displayName(user){return localStorage.getItem('sc_full_name') || (user && user.email ? user.email.split('@')[0] : 'User')}
        const user=decodeToken();
        if(!user){window.location.href='/login'}
        const role=String(user.role||'Student'); const name=displayName(user); const initials=name.split(/[ ._@-]+/).filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase()||'SC';
        document.getElementById('sideName').textContent=name; document.getElementById('sideRole').textContent=role;
        document.getElementById('profileName').textContent=name; document.getElementById('profileSubtitle').textContent=role+' account';
        document.getElementById('profileID').textContent=user.user_id||'-'; document.getElementById('profileEmail').textContent=user.email||'-'; document.getElementById('profileRole').textContent=role; document.getElementById('avatar').textContent=initials;
        if(role.toUpperCase()==='ADMIN'){
            document.querySelectorAll('.admin-only').forEach(el=>el.style.display='flex');
                    document.querySelectorAll('a[href="/bookings-ui"]').forEach(el => {
                        const h3 = el.querySelector && el.querySelector('h3');
                        if (h3) h3.textContent = 'All Bookings';
                        else el.textContent = '▣ All Bookings';
                    });
        } else {
            document.querySelectorAll('.admin-only').forEach(el=>el.style.display='none');
        }
        document.getElementById('logoutBtn').addEventListener('click',()=>{localStorage.removeItem('sc_token');localStorage.removeItem('sc_user');window.location.href='/login'})
    </script>
</body>
</html>
