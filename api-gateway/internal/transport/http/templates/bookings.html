<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Bookings - Smart Campus</title>
    <style>
        :root {
            --bg: #eef5ff;
            --sidebar: #fbfdff;
            --card: #fbfcff;
            --text: #2d3748;
            --muted: #8da0bd;
            --line: #dde8f6;
            --blue: #5b9dec;
            --teal: #65c8a7;
            --danger: #ef4444;
            --success: #15803d;
            --amber: #b45309;
            --gray: #475467;
            --shadow: 0 16px 40px rgba(61, 83, 120, 0.08);
            --radius: 22px;
        }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
        .app { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }
        .sidebar { position: sticky; top: 0; height: 100vh; padding: 28px 20px; background: var(--sidebar); border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 34px; }
        .brand { display: flex; align-items: center; gap: 14px; font-size: 1.25rem; font-weight: 900; text-decoration: none; color: var(--text); }
        .brand-icon { width: 48px; height: 48px; border-radius: 16px; display: grid; place-items: center; color: white; background: linear-gradient(135deg, var(--blue), var(--teal)); font-weight: 900; }
        .nav { display: grid; gap: 10px; }
        .nav a, .logout { min-height: 52px; padding: 0 16px; border: 0; border-radius: 16px; display: flex; align-items: center; gap: 14px; background: transparent; color: #617492; font: inherit; font-weight: 800; text-decoration: none; cursor: pointer; transition: 0.18s ease; }
        .nav a:hover, .logout:hover { background: #edf5ff; color: var(--text); }
        .nav a.active { background: #e4effc; color: var(--text); outline: 2px solid #111827; }
        .logout { margin-top: auto; color: var(--danger); }
        .admin-only { display: none; }
        .auth-links {
            margin-top: auto;
            display: grid;
            gap: 10px;
        }

        .user-card {
            margin-top: auto;
            display: none;
            width: 100%;
            padding: 18px 16px;
            border-radius: 18px;
            background: #f4f9ff;
            border: 1px solid var(--line);
            gap: 8px;
        }

        .user-card strong {
            display: block;
            color: #1f2937;
            font-weight: 900;
            font-size: 1rem;
            line-height: 1.25;
        }

        .user-card span {
            display: block;
            color: var(--muted);
            font-weight: 800;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        #logoutBtn {
            width: 100%;
            min-height: 44px;
            border: 1px solid #ff9f9f;
            border-radius: 14px;
            background: #ffffff;
            color: var(--danger);
            display: flex;
            align-items: center;
            justify-content: center;
            font: inherit;
            font-weight: 900;
            cursor: pointer;
            transition: 0.18s ease;
        }

        #logoutBtn:hover {
            background: #fff0f0;
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(239, 68, 68, 0.08);
        }
        .main { min-width: 0; }
        .topbar { height: 72px; border-bottom: 1px solid var(--line); background: rgba(251, 253, 255, 0.84); display: flex; justify-content: flex-end; align-items: center; padding: 0 28px; }
        .bell { font-size: 1.35rem; color: #617492; }
        .content { width: min(980px, calc(100% - 64px)); margin: 0 auto; padding: 36px 0 64px; }
        .page-head { margin-bottom: 24px; }
        h1 { margin: 0; font-size: clamp(2rem, 3vw, 2.4rem); }
        .subtle { color: var(--muted); margin: 8px 0 0; font-size: 1.05rem; font-weight: 650; }
        .alert { display: none; margin: 0 0 18px; padding: 14px 16px; border-radius: 16px; font-weight: 800; }
        .alert.error { display: block; color: #b42318; background: #fef3f2; border: 1px solid #fecdca; }
        .alert.success { display: block; color: var(--success); background: #ecfdf3; border: 1px solid #abefc6; }
        .alert.info { display: block; color: #1d4ed8; background: #eff6ff; border: 1px solid #bfdbfe; }
        .filters, .booking-card { background: var(--card); border: 1px solid #edf3fb; border-radius: var(--radius); box-shadow: var(--shadow); }
        .filters { padding: 14px; margin-bottom: 22px; display: flex; gap: 10px; flex-wrap: wrap; }
        label { display: block; color: #617492; font-weight: 850; margin-bottom: 8px; }
        input { width: 100%; min-height: 50px; border: 1px solid #d8e5f5; border-radius: 16px; padding: 0 16px; background: white; color: var(--text); font: inherit; }
        input:focus { outline: 0; border-color: #8bc1ff; box-shadow: 0 0 0 4px rgba(91, 157, 236, 0.16); }
        .btn { min-height: 50px; border: 0; border-radius: 16px; padding: 0 20px; font: inherit; font-weight: 900; cursor: pointer; transition: transform 0.18s ease, box-shadow 0.18s ease; }
        .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
        .btn-primary { color: white; background: linear-gradient(135deg, var(--blue), var(--teal)); }
        .btn-danger { color: var(--danger); background: white; border: 1px solid #ff9f9f; }
        .btn-danger:hover { background: #fff0f0; }
        .btn:disabled { opacity: 0.65; cursor: wait; transform: none; }
        .bookings-list { display: grid; gap: 16px; }
        .booking-card { padding: 22px; display: grid; grid-template-columns: 58px 1fr auto; gap: 18px; align-items: center; }
        .room-icon { width: 56px; height: 56px; border-radius: 16px; display: grid; place-items: center; background: #e6f2ff; color: var(--blue); font-size: 1.35rem; font-weight: 900; }
        .booking-title { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
        .booking-title strong { font-size: 1.08rem; }
        .status { display: inline-flex; padding: 5px 11px; border-radius: 999px; font-size: 0.85rem; font-weight: 900; text-transform: lowercase; }
        .status.confirmed { background: #dcfce7; color: var(--success); }
        .status.cancelled { background: #fee4e2; color: #b42318; }
        .status.pending { background: #fffaeb; color: var(--amber); }
        .status.rejected { background: #f2f4f7; color: var(--gray); }
        .booking-time { color: var(--muted); font-weight: 750; }
        .purpose { color: #617492; margin-top: 4px; }
        .booking-user { color: #475467; margin-top: 6px; font-weight: 700; }
        .empty { min-height: 240px; display: grid; place-items: center; color: var(--muted); font-weight: 800; background: var(--card); border-radius: var(--radius); border: 1px dashed #cbd9ee; }
        @media (max-width: 820px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { position: static; height: auto; }
            .content { width: min(100% - 28px, 980px); }
            .booking-card { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <a class="brand" href="/"><span class="brand-icon">SC</span><span>Smart Campus</span></a>
            <nav class="nav">
                <a href="/">▦ Dashboard</a>
                <a href="/rooms-ui">▥ Rooms</a>
                <a class="active" href="/bookings-ui">▣ My Bookings</a>
                <a class="private-link" href="/profile-ui">♙ Profile</a>
                <a class="admin-only" href="/admin-ui">◇ Admin</a>
            </nav>
            <div id="authLinks" class="auth-links">
                <a class="btn btn-primary" href="/login">Login</a>
                <a class="btn" href="/register">Register</a>
            </div>
            <div id="userCard" class="user-card">
                <strong id="sideName">User</strong>
                <span id="sideRole">Role</span>
                <button id="logoutBtn" class="btn-danger" type="button">Logout</button>
            </div>
        </aside>

        <main class="main">
            <div class="topbar"><span class="bell">♢</span></div>
            <section class="content">
                <header class="page-head">
                    <h1>My Bookings</h1>
                <p id="bookingsMeta" class="subtle">Your bookings load automatically from your account.</p>
                </header>
                <div id="message" class="alert"></div>

                <section class="filters">
                    <button class="btn btn-primary" type="button" data-filter="all">All</button>
                    <button class="btn" type="button" data-filter="active">Active</button>
                    <button class="btn" type="button" data-filter="cancelled">Cancelled</button>
                </section>

                <section id="bookingsBody" class="bookings-list">
                    <div class="empty">No bookings loaded yet.</div>
                </section>
            </section>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('sc_token');
        const user = decodeToken();
        const message = document.getElementById('message');
        const bookingsBody = document.getElementById('bookingsBody');
        const bookingsMeta = document.getElementById('bookingsMeta');
        let currentUserID = '';
        let allBookings = [];
        let currentFilter = 'all';

        function decodeToken(){if(!token)return null;try{const base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');return JSON.parse(decodeURIComponent(escape(atob(base64))))}catch(e){return null}}
        function displayName(user){return localStorage.getItem('sc_full_name')|| (user && user.email ? user.email.split('@')[0] : 'User')}
        function showMessage(text, type) { message.textContent = text; message.className = 'alert ' + type; }
        function clearMessage() { message.className = 'alert'; message.textContent = ''; }
        function authHeaders() {
            const headers = { 'Content-Type': 'application/json' };
            if (token) { headers.Authorization = 'Bearer ' + token; }
            return headers;
        }
        function setLoading(button, loading, text) {
            if (!button) return;
            if (loading) { button.dataset.originalText = button.textContent; button.textContent = text || 'Loading...'; button.disabled = true; return; }
            button.textContent = button.dataset.originalText || button.textContent; button.disabled = false;
        }
        async function parseResponse(res) {
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.error || data.message || 'Request failed');
            return data;
        }
        function bookingValue(booking, snake, camel) { return booking[snake] ?? booking[camel] ?? ''; }
        function getBookings(data) {
            if (data.bookings) return data.bookings;
            if (data.Bookings) return data.Bookings;
            if (data.booking) return [data.booking];
            if (data.Booking) return [data.Booking];
            return [];
        }
        async function enrichBookingsWithUserInfo(bookings) {
            if (!user || String(user.role||'').toUpperCase() !== 'ADMIN') return bookings;
            return await Promise.all(bookings.map(async (booking) => {
                const userId = bookingValue(booking, 'user_id', 'userId');
                if (!userId) return booking;
                try {
                    const res = await fetch('/users/' + encodeURIComponent(userId), { headers: authHeaders() });
                    if (!res.ok) return booking;
                    const data = await parseResponse(res).catch(() => ({}));
                    return { ...booking, bookingUser: data.user || data };
                } catch {
                    return booking;
                }
            }));
        }
        function formatDate(value) {
            if (!value) return '';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return value;
            return date.toLocaleString();
        }
        async function renderBookings(data) {
            allBookings = await enrichBookingsWithUserInfo(getBookings(data));
            applyFilter();
        }
        function applyFilter() {
            let bookings = allBookings;
            if (currentFilter === 'active') bookings = allBookings.filter((booking) => String(bookingValue(booking, 'status', 'status')).toUpperCase() !== 'CANCELLED');
            if (currentFilter === 'cancelled') bookings = allBookings.filter((booking) => String(bookingValue(booking, 'status', 'status')).toUpperCase() === 'CANCELLED');
            bookingsMeta.textContent = bookings.length + ' booking' + (bookings.length === 1 ? '' : 's');
            bookingsBody.innerHTML = '';
            if (!bookings.length) { bookingsBody.innerHTML = '<div class="empty">No bookings found.</div>'; return; }
                bookings.forEach((booking) => {
                const id = bookingValue(booking, 'id', 'id');
                const statusRaw = String(bookingValue(booking, 'status', 'status') || 'PENDING');
                const status = statusRaw.toLowerCase();
                const roomID = bookingValue(booking, 'room_id', 'roomId');
                const card = document.createElement('article');
                card.className = 'booking-card';
                const bookingUser = booking.bookingUser || {};
                const userLabel = bookingUser.full_name || bookingUser.email || `User #${bookingValue(booking, 'user_id', 'userId')}`;
                const userRoleText = bookingUser.role ? String(bookingUser.role).toLowerCase().replace(/^./, (c) => c.toUpperCase()) : 'Unknown';
                const isAdminView = user && String(user.role||'').toUpperCase() === 'ADMIN';
                card.innerHTML = `
                    <div class="room-icon">▥</div>
                    <div>
                        <div class="booking-title"><strong>Room ${roomID}</strong> <small style="margin-left:8px;color:#718096;">#${id}</small><span class="status ${status}">${statusRaw}</span></div>
                        <div class="booking-time">${formatDate(bookingValue(booking, 'start_time', 'startTime'))} - ${formatDate(bookingValue(booking, 'end_time', 'endTime'))}</div>
                        <div class="booking-user">Booked by: ${userLabel} (${userRoleText})</div>
                        <div class="purpose">${bookingValue(booking, 'purpose', 'purpose')}</div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">
                        ${isAdminView ? '' : `<button class="btn btn-danger" type="button" data-booking-id="${id}">Cancel</button>`}
                    </div>
                `;
                const cancelButton = card.querySelector('button');
                if (cancelButton) {
                    cancelButton.addEventListener('click', (event) => cancelBooking(id, event.currentTarget));
                }
                bookingsBody.appendChild(card);
            });
        }
        async function loadUserBookings(userID, button) {
            currentUserID = userID;
            setLoading(button, true, 'Loading...');
            try {
                const res = await fetch('/bookings/my?user_id=' + encodeURIComponent(userID), { headers: authHeaders() });
                await renderBookings(await parseResponse(res));
            } finally { setLoading(button, false); }
        }
        async function cancelBooking(bookingID, button) {
                if (!currentUserID && !(user && String(user.role||'').toUpperCase() === 'ADMIN')) { showMessage('Load your bookings first.', 'error'); return; }
            clearMessage();
            setLoading(button, true, 'Cancelling...');
            try {
                const res = await fetch('/bookings/' + encodeURIComponent(bookingID) + '?user_id=' + encodeURIComponent(currentUserID), { method: 'DELETE', headers: authHeaders() });
                await parseResponse(res);
                showMessage('Booking cancelled successfully.', 'success');
                await loadUserBookings(currentUserID);
            } catch (error) { showMessage(error.message, 'error'); }
            finally { setLoading(button, false); }
        }

        const authLinks = document.getElementById('authLinks');
        const userCard = document.getElementById('userCard');
        const logoutBtn = document.getElementById('logoutBtn');
        if (!token || !user) {
            authLinks.style.display = 'grid';
            userCard.style.display = 'none';
            if (logoutBtn) { logoutBtn.style.display = 'none'; }
            showMessage('Please login first. Redirecting to login...', 'info');
            setTimeout(() => { window.location.href = '/login'; }, 1200);
        } else {
            authLinks.style.display = 'none';
            userCard.style.display = 'grid';
            if (logoutBtn) { logoutBtn.style.display = 'inline-flex'; }
            document.getElementById('sideName').textContent = displayName(user);
            document.getElementById('sideRole').textContent = String(user.role||'Student');
            currentUserID = user.user_id;
            if(String(user.role||'').toUpperCase()==='ADMIN'){
                document.querySelectorAll('.admin-only').forEach(el=>el.style.display='flex');
                document.title = 'All Bookings - Smart Campus';
                const h1 = document.querySelector('h1'); if (h1) h1.textContent = 'All Bookings';
                bookingsMeta.textContent = 'All bookings across the system.';
                document.querySelectorAll('a[href="/bookings-ui"]').forEach(el => {
                    const h3 = el.querySelector && el.querySelector('h3');
                    if (h3) h3.textContent = 'All Bookings';
                    else el.textContent = '▣ All Bookings';
                });
                loadUserBookings(0).catch((error) => showMessage(error.message, 'error'));
            } else {
                document.querySelectorAll('.admin-only').forEach(el=>el.style.display='none');
                loadUserBookings(currentUserID).catch((error) => showMessage(error.message, 'error'));
            }
        }
        if (logoutBtn) { logoutBtn.addEventListener('click', () => { localStorage.removeItem('sc_token'); localStorage.removeItem('sc_user'); window.location.href = '/login'; }); }
        document.querySelectorAll('[data-filter]').forEach((button) => {
            button.addEventListener('click', () => {
                currentFilter = button.dataset.filter;
                applyFilter();
            });
        });
    </script>
</body>
</html>
